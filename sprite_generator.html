<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sprite Generator</title>
    <style>
        body {
            background: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        canvas {
            border: 1px solid #333;
            margin: 10px;
        }
        .controls {
            margin: 20px;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background: #45a049;
        }
    </style>
</head>
<body>
    <h1>Sprite Generator</h1>
    <div class="controls">
        <button onclick="generatePlayer()">Generate Player</button>
        <button onclick="generateRaptor()">Generate Raptor</button>
        <button onclick="generateTriceratops()">Generate Triceratops</button>
        <button onclick="generateTRex()">Generate T-Rex</button>
        <button onclick="generateBullet()">Generate Bullet</button>
        <button onclick="generatePowerUp()">Generate Power-up</button>
    </div>
    <canvas id="spriteCanvas" width="256" height="64"></canvas>
    <div id="downloadLink"></div>

    <script>
        const canvas = document.getElementById('spriteCanvas');
        const ctx = canvas.getContext('2d');
        const downloadLink = document.getElementById('downloadLink');

        function downloadSprite(name) {
            const link = document.createElement('a');
            link.download = name;
            link.href = canvas.toDataURL('image/png');
            downloadLink.innerHTML = '';
            downloadLink.appendChild(link);
            link.click();
        }

        function generatePlayer() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < 4; i++) {
                ctx.save();
                ctx.translate(i * 64, 0);
                
                // Body
                ctx.fillStyle = '#4CAF50';
                ctx.fillRect(12, 12, 40, 40);
                
                // Gun
                ctx.fillStyle = '#333';
                ctx.fillRect(32, 0, 8, 20);
                
                // Animation frames
                if (i === 1) {
                    ctx.translate(0, 2);
                } else if (i === 2) {
                    ctx.translate(0, 4);
                } else if (i === 3) {
                    ctx.translate(0, 2);
                }
                
                ctx.restore();
            }
            downloadSprite('player.png');
        }

        function generateRaptor() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < 4; i++) {
                ctx.save();
                ctx.translate(i * 64, 0);
                
                // Body
                ctx.fillStyle = '#FF4444';
                ctx.beginPath();
                ctx.moveTo(32, 10);
                ctx.lineTo(50, 30);
                ctx.lineTo(50, 50);
                ctx.lineTo(14, 50);
                ctx.lineTo(14, 30);
                ctx.closePath();
                ctx.fill();
                
                // Eyes
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(25, 25, 3, 0, Math.PI * 2);
                ctx.arc(39, 25, 3, 0, Math.PI * 2);
                ctx.fill();
                
                // Animation frames
                if (i === 1 || i === 3) {
                    ctx.translate(0, 2);
                }
                
                ctx.restore();
            }
            downloadSprite('raptor.png');
        }

        function generateTriceratops() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < 4; i++) {
                ctx.save();
                ctx.translate(i * 64, 0);
                
                // Body
                ctx.fillStyle = '#44FF44';
                ctx.beginPath();
                ctx.moveTo(32, 10);
                ctx.lineTo(50, 20);
                ctx.lineTo(50, 50);
                ctx.lineTo(14, 50);
                ctx.lineTo(14, 20);
                ctx.closePath();
                ctx.fill();
                
                // Horns
                ctx.fillStyle = '#22CC22';
                ctx.beginPath();
                ctx.moveTo(20, 20);
                ctx.lineTo(25, 10);
                ctx.lineTo(30, 20);
                ctx.closePath();
                ctx.fill();
                
                ctx.beginPath();
                ctx.moveTo(34, 20);
                ctx.lineTo(39, 10);
                ctx.lineTo(44, 20);
                ctx.closePath();
                ctx.fill();
                
                // Animation frames
                if (i === 1 || i === 3) {
                    ctx.translate(0, 2);
                }
                
                ctx.restore();
            }
            downloadSprite('triceratops.png');
        }

        function generateTRex() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < 4; i++) {
                ctx.save();
                ctx.translate(i * 64, 0);
                
                // Body
                ctx.fillStyle = '#4444FF';
                ctx.beginPath();
                ctx.moveTo(32, 10);
                ctx.lineTo(50, 20);
                ctx.lineTo(50, 50);
                ctx.lineTo(14, 50);
                ctx.lineTo(14, 20);
                ctx.closePath();
                ctx.fill();
                
                // Head
                ctx.beginPath();
                ctx.moveTo(32, 20);
                ctx.lineTo(45, 15);
                ctx.lineTo(45, 25);
                ctx.closePath();
                ctx.fill();
                
                // Animation frames
                if (i === 1 || i === 3) {
                    ctx.translate(0, 2);
                }
                
                ctx.restore();
            }
            downloadSprite('trex.png');
        }

        function generateBullet() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < 2; i++) {
                ctx.save();
                ctx.translate(i * 32, 0);
                
                // Bullet
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                ctx.moveTo(16, 0);
                ctx.lineTo(32, 16);
                ctx.lineTo(0, 16);
                ctx.closePath();
                ctx.fill();
                
                // Animation frames
                if (i === 1) {
                    ctx.translate(0, 2);
                }
                
                ctx.restore();
            }
            downloadSprite('bullet.png');
        }

        function generatePowerUp() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < 4; i++) {
                ctx.save();
                ctx.translate(i * 32, 0);
                
                // Power-up circle
                ctx.fillStyle = i === 0 ? '#FF0000' : i === 1 ? '#FFFF00' : i === 2 ? '#00FFFF' : '#FF00FF';
                ctx.beginPath();
                ctx.arc(16, 16, 12, 0, Math.PI * 2);
                ctx.fill();
                
                // Icon
                ctx.fillStyle = '#000';
                if (i === 0) { // Health
                    ctx.beginPath();
                    ctx.moveTo(16, 10);
                    ctx.lineTo(16, 22);
                    ctx.lineTo(10, 22);
                    ctx.lineTo(22, 22);
                    ctx.lineTo(16, 10);
                    ctx.fill();
                } else if (i === 1) { // Ammo
                    ctx.fillRect(10, 14, 12, 4);
                } else if (i === 2) { // Speed
                    ctx.beginPath();
                    ctx.moveTo(10, 16);
                    ctx.lineTo(22, 16);
                    ctx.lineTo(16, 22);
                    ctx.fill();
                } else { // Special
                    ctx.beginPath();
                    ctx.arc(16, 16, 4, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                ctx.restore();
            }
            downloadSprite('powerup.png');
        }
    </script>
</body>
</html>
